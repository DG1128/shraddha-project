<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Shraddha Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#F4F7FC] h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Abstract Background -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-blue-600/10 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-indigo-600/10 blur-[100px] rounded-full"></div>
    </div>

    <!-- Login Card -->
    <div class="bg-white/80 backdrop-blur-xl p-10 rounded-3xl shadow-xl shadow-slate-200/50 w-full max-w-md border border-white relative z-10">
        <div class="text-center mb-10">
            <div class="w-16 h-16 mx-auto bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center mb-5 shadow-lg shadow-blue-600/20">
                <span class="text-white font-extrabold text-3xl">S</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Shraddha</h1>
            <p class="text-sm text-slate-500 mt-2 font-bold tracking-widest uppercase">Admin Portal</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm font-bold mb-6 border border-red-100/50 text-center flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-extrabold text-slate-700 mb-2">Username</label>
                <input type="text" name="username" 
                       class="w-full px-5 py-3.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-600/10 focus:border-blue-600 transition-all bg-white text-slate-900 font-semibold shadow-sm" 
                       placeholder="admin" required autofocus>
            </div>
            <div>
                <label class="block text-sm font-extrabold text-slate-700 mb-2">Password</label>
                <input type="password" name="password" 
                       class="w-full px-5 py-3.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-600/10 focus:border-blue-600 transition-all bg-white text-slate-900 font-semibold shadow-sm" 
                       placeholder="••••••••" required>
            </div>
            <button type="submit" 
                    class="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-blue-600 transition-all shadow-md mt-4 active:scale-[0.98]">
                Sign In to Dashboard
            </button>
        </form>
    </div>
</body>
</html>
