<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white flex justify-between">
        <div class="font-bold text-xl">Admin Panel</div>
        <div>
            <a href="/admin" class="mr-4 hover:underline">Enquiries</a>
            <a href="/admin/products" class="mr-4 font-semibold underline">Products</a>
            <a href="/admin/logout" class="hover:underline">Logout</a>
        </div>
    </nav>
    <div class="container mx-auto mt-8 p-4 bg-white rounded shadow">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">Products</h2>
            <a href="/admin/product/add" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm transition-colors">Add Product</a>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white border text-left text-sm">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="py-2 px-4 border font-medium text-center">Image</th>
                        <th class="py-2 px-4 border font-medium">Name</th>
                        <th class="py-2 px-4 border font-medium">Category</th>
                        <th class="py-2 px-4 border font-medium">Price</th>
                        <th class="py-2 px-4 border font-medium text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in products %}
                    <tr class="border-b hover:bg-gray-50">
                        <td class="py-2 px-4 flex justify-center">
                            <img src="{{ p.img }}" alt="{{ p.name }}" class="w-16 h-16 object-cover rounded border">
                        </td>
                        <td class="py-2 px-4">{{ p.name }}</td>
                        <td class="py-2 px-4 text-gray-600">{{ p.cat_name }}</td>
                        <td class="py-2 px-4 font-semibold">{{ p.price }}</td>
                        <td class="py-2 px-4 text-center">
                            <a href="/admin/product/edit/{{ p._id }}" class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded text-xs mr-2 transition-colors">Edit</a>
                            <form action="/admin/product/delete/{{ p._id }}" method="POST" class="inline" onsubmit="return confirm('Delete this product?');">
                                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs transition-colors">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr><td colspan="5" class="py-6 text-center text-gray-500">No products found.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
